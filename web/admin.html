<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — Dvacatka</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/app.js"></script>
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <span class="nav__brand">🛠 Админ-панель <span class="dot">Dvacatka</span></span>
      <button id="logoutBtn" onclick="adminLogout()" class="nav__btn hidden">Выход</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-7">
    <div id="err" class="hidden alert alert--error mb-4"></div>

    <div id="loginBox" class="max-w-sm mx-auto card card--pad hidden">
      <h2 class="font-bold mb-3">Вход администратора</h2>
      <form id="loginForm" class="space-y-3">
        <input name="password" type="password" placeholder="ADMIN_PASSWORD" required class="input" />
        <button class="btn btn--primary btn--block">Войти</button>
      </form>
    </div>

    <div id="panel" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold">Пользователи (<span id="count">0</span>)</h2>
        <button onclick="openCreate()" class="btn btn--primary btn--sm">+ Создать пользователя</button>
      </div>
      <div class="card overflow-x-auto">
        <table class="table">
          <thead>
            <tr><th>Никнейм</th><th>Имя</th><th>Email</th><th>Телефон</th><th>Кат.</th><th>Статус</th><th>Действия</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <h2 class="text-xl font-bold mb-4 mt-8">Лобби (<span id="lcount">0</span>)</h2>
      <div class="card overflow-x-auto">
        <table class="table">
          <thead>
            <tr><th>Название</th><th>Тип</th><th>Статус</th><th>Игроки</th><th>Действия</th></tr>
          </thead>
          <tbody id="lrows"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden modal-backdrop">
    <div class="card card--pad w-full max-w-md">
      <h3 class="text-lg font-bold mb-4">Новый пользователь</h3>
      <div id="modalErr" class="hidden alert alert--error mb-3"></div>
      <form id="createForm" class="space-y-3">
        <input name="phone" placeholder="Телефон" required class="input" />
        <input name="email" type="email" placeholder="Email" required class="input" />
        <input name="nickname" placeholder="Никнейм" required class="input" />
        <input name="real_name" placeholder="Имя" class="input" />
        <select name="category" required class="select">
          <option value="A">A</option><option value="B">B</option>
          <option value="C">C</option><option value="Д">Д</option><option value="Captain">Captain</option>
        </select>
        <input name="password" type="password" placeholder="Пароль (мин. 6)" required class="input" />
        <div class="flex gap-2">
          <button type="button" onclick="closeCreate()" class="btn btn--ghost btn--block">Отмена</button>
          <button class="btn btn--primary btn--block">Создать</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function showErr(msg) { const e=document.getElementById("err"); e.textContent=msg; e.classList.remove("hidden"); setTimeout(()=>e.classList.add("hidden"),4000); }

    async function loadUsers() {
      const data = await api("GET", "/admin/users");
      document.getElementById("count").textContent = data.users.length;
      document.getElementById("rows").innerHTML = data.users.map(u => `
        <tr>
          <td class="font-medium">${esc(u.nickname)}</td>
          <td class="muted">${esc(u.real_name||"")}</td>
          <td class="muted">${esc(u.email)}</td>
          <td class="muted">${esc(u.phone)}</td>
          <td><span class="cat">${esc(u.category)}</span></td>
          <td>${u.is_blocked?'<span style="color:var(--red)">заблокирован</span>':'<span style="color:var(--green)">активен</span>'}</td>
          <td class="whitespace-nowrap">
            <button onclick="resetPw('${u.id}','${esc(u.nickname)}')" class="btn btn--ghost btn--sm">Сброс пароля</button>
            <button onclick="toggleBlock('${u.id}',${u.is_blocked})" class="btn btn--warn btn--sm">${u.is_blocked?'Разблок.':'Блок'}</button>
            <button onclick="delUser('${u.id}','${esc(u.nickname)}')" class="btn btn--danger btn--sm">Удалить</button>
          </td>
        </tr>`).join("");
    }

    async function resetPw(id, nick) {
      const pw = prompt(`Новый пароль для ${nick} (мин. 6):`);
      if (!pw) return;
      try { await api("POST", `/admin/users/${id}/reset-password`, { password: pw }); alert("Пароль сброшен"); }
      catch (e) { showErr(e.message); }
    }
    async function toggleBlock(id, blocked) {
      try { await api("POST", `/admin/users/${id}/block`, { blocked: !blocked }); await loadUsers(); }
      catch (e) { showErr(e.message); }
    }
    async function delUser(id, nick) {
      if (!confirm(`Удалить ${nick}?`)) return;
      try { await api("DELETE", `/admin/users/${id}`); await loadUsers(); }
      catch (e) { showErr(e.message); }
    }

    function openCreate() { document.getElementById("createForm").reset(); document.getElementById("modalErr").classList.add("hidden"); document.getElementById("modal").classList.remove("hidden"); }
    function closeCreate() { document.getElementById("modal").classList.add("hidden"); }
    document.getElementById("createForm").onsubmit = async (e) => {
      e.preventDefault();
      const o = {}; new FormData(e.target).forEach((v,k)=>o[k]=v);
      try { await api("POST", "/admin/create-user", o); closeCreate(); await loadUsers(); }
      catch (err) { const el=document.getElementById("modalErr"); el.textContent=err.message; el.classList.remove("hidden"); }
    };

    const STATUS_RU = { open: "Сбор", draft: "Драфт", active: "Идёт", finished: "Завершён" };
    async function loadLobbies() {
      const data = await api("GET", "/admin/lobbies");
      document.getElementById("lcount").textContent = data.lobbies.length;
      document.getElementById("lrows").innerHTML = data.lobbies.length ? data.lobbies.map(l => `
        <tr>
          <td class="font-medium">${esc(l.name)}</td>
          <td class="muted">${esc(l.type)}</td>
          <td>${STATUS_RU[l.status] || l.status}</td>
          <td class="muted">${l.players_count}/${l.max_players}</td>
          <td class="whitespace-nowrap">
            <a href="/lobby.html?id=${l.id}" target="_blank" class="btn btn--ghost btn--sm">Открыть</a>
            <button onclick="delLobby('${l.id}','${esc(l.name)}')" class="btn btn--danger btn--sm">Удалить</button>
          </td>
        </tr>`).join("") : `<tr><td colspan="5" class="muted">Лобби нет</td></tr>`;
    }
    async function delLobby(id, name) {
      if (!confirm(`Удалить лобби «${name}»? (любой статус)`)) return;
      try { await api("DELETE", `/admin/lobbies/${id}`); await loadLobbies(); }
      catch (e) { showErr(e.message); }
    }

    async function adminLogout() { try { await api("POST", "/admin/logout"); } catch {} showPanel(false); }
    function showPanel(on) {
      document.getElementById("panel").classList.toggle("hidden", !on);
      document.getElementById("loginBox").classList.toggle("hidden", on);
      document.getElementById("logoutBtn").classList.toggle("hidden", !on);
    }

    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const o = {}; new FormData(e.target).forEach((v,k)=>o[k]=v);
      try { await api("POST", "/admin/login", o); showPanel(true); await loadUsers(); await loadLobbies(); }
      catch (err) { showErr(err.message); }
    };

    async function init() {
      try { await loadUsers(); await loadLobbies(); showPanel(true); }
      catch { showPanel(false); }
    }
    init();
  </script>
</body>
</html>
