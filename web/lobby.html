<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лобби — Dvacatka</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css?v=3" />
  <script src="/static/app.js?v=3"></script>
</head>
<body>
  <div id="nav"></div>
  <main class="max-w-4xl mx-auto px-4 py-7">
    <a href="/" class="muted text-sm hover:underline">← К списку лобби</a>
    <div id="head" class="my-3"></div>
    <div id="err" class="hidden alert alert--error mb-4"></div>
    <div id="body"></div>
  </main>

  <script>
    const LID = qs("id");
    let me, lobby, draftState;

    function flashErr(msg) {
      const e = document.getElementById("err");
      e.textContent = msg; e.classList.remove("hidden");
      setTimeout(() => e.classList.add("hidden"), 4000);
    }
    async function act(method, url, body) {
      try { await api(method, url, body); await reload(); }
      catch (err) { flashErr(err.message); }
    }
    function nick(uid) {
      const i = (lobby.player_info || {})[uid];
      return i ? i.nickname : uid.slice(-6);
    }
    function catOf(uid) {
      const i = (lobby.player_info || {})[uid];
      return i ? i.category : "";
    }
    let isAdmin = false;
    const isCreator = () => me && lobby && me.id === lobby.creator_id;
    const isManager = () => isCreator() || isAdmin;
    const creatorIsSpectator = () => lobby && !lobby.players.some(p => p.user_id === lobby.creator_id);

    async function reload() {
      lobby = await api("GET", "/lobby/" + LID);
      if (lobby.status === "draft") draftState = await api("GET", "/lobby/" + LID + "/draft-state");
      render();
    }

    function render() {
      const t = LOBBY_TYPES[lobby.type] || { label: lobby.type };
      document.getElementById("head").innerHTML = `
        <div class="card card--pad">
          <div class="flex items-center justify-between gap-3">
            <h1 class="text-2xl font-extrabold flex items-center gap-2">
              ${lobby.has_password ? "🔒 " : ""}${esc(lobby.name)}
              ${isManager() ? `<button onclick="renameLobby()" title="Переименовать" class="btn btn--ghost btn--sm">✏️</button>` : ""}
            </h1>
            ${statusBadge(lobby.status)}
          </div>
          <div class="muted text-sm mt-1">${t.label} · ${lobby.players_count}/${lobby.max_players} игроков · ${lobby.team_count} команд</div>
          ${paymentBlock()}
        </div>`;
      const map = { open: renderOpen, draft: renderDraft, active: renderActive, finished: renderFinished };
      document.getElementById("body").innerHTML = (map[lobby.status] || (() => ""))();
    }

    function paymentBlock() {
      const p = lobby.payment_details || {};
      if (!p.phone && !p.card) return "";
      return `<div class="alert alert--info text-sm mt-3">💳 Оплата: ${p.phone ? esc(p.phone) : ""}${p.card ? " · " + esc(p.card) : ""}</div>`;
    }

    // ---------- ЭТАП 1: СБОР ИГРОКОВ ----------
    function renderOpen() {
      const inLobby = lobby.players.some(p => p.user_id === me.id);
      const full = lobby.players_count >= lobby.max_players;
      const rows = lobby.players.map(p => {
        const meRow = p.user_id === me.id;
        const paid = p.paid
          ? `<span style="color:var(--green)">✅ оплатил</span>`
          : `<span class="muted">не оплатил</span>`;
        // Кнопка оплаты: свою — себе; чужую — менеджер (создатель/админ).
        let toggle = "";
        if (meRow) {
          toggle = `<button onclick="act('POST','/lobby/${LID}/toggle-paid')" class="btn btn--ghost btn--sm">${p.paid ? "Снять ✅" : "Оплатил ✅"}</button>`;
        } else if (isManager()) {
          toggle = `<button onclick="act('POST','/lobby/${LID}/set-paid/${p.user_id}',{paid:${!p.paid}})" class="btn btn--ghost btn--sm">${p.paid ? "Снять ✅" : "Оплатил ✅"}</button>`;
        }
        const kick = (isManager() && !meRow)
          ? `<button onclick="act('POST','/lobby/${LID}/kick/${p.user_id}')" class="btn btn--danger btn--sm">Выгнать</button>`
          : "";
        // Менеджер может менять тир игрока только в рамках этого лобби.
        const tier = isManager()
          ? `<select onchange="setTier('${p.user_id}', this.value)" class="select" style="width:auto;padding:6px 10px;font-size:.8rem" title="Тир в этом лобби">
              ${CATEGORIES.map(c => `<option value="${c}" ${catOf(p.user_id) === c ? "selected" : ""}>${c}</option>`).join("")}
            </select>`
          : `<span class="cat">${esc(catOf(p.user_id))}</span>`;
        return `<div class="row">
          <a href="/player.html?id=${p.user_id}" class="font-medium hover:underline flex items-center gap-2">
            ${esc(nick(p.user_id))}${meRow ? " (вы)" : ""}${p.user_id === lobby.creator_id ? " 👑" : ""}
          </a>
          <div class="flex items-center gap-3 text-sm">${tier}${paid}${toggle}${kick}</div>
        </div>`;
      }).join("");

      // Считаем капитанов (тир Captain) — их нужно столько же, сколько команд.
      const captains = lobby.players.filter(p => catOf(p.user_id) === "Captain").length;
      const enoughCaps = captains >= lobby.team_count;

      let controls = "";
      if (!inLobby && !full) controls += `<button onclick="joinLobby()" class="btn btn--primary">${creatorIsSpectator() && isCreator() ? "Войти как игрок" : "Войти в лобби"}</button>`;
      if (inLobby && !isCreator()) controls += `<button onclick="act('POST','/lobby/${LID}/leave')" class="btn btn--ghost">Выйти</button>`;
      // Создатель может стать зрителем (выйти из игроков, но продолжить вести лобби).
      if (isCreator() && inLobby) controls += `<button onclick="act('POST','/lobby/${LID}/spectate')" class="btn btn--ghost" title="Не играть, только следить">Стать зрителем 👁</button>`;
      if (isManager()) {
        let label = "Начать драфт";
        if (!full) label += ` (${lobby.players_count}/${lobby.max_players})`;
        else if (!enoughCaps) label += ` (капитанов ${captains}/${lobby.team_count})`;
        controls += `<button onclick="act('POST','/lobby/${LID}/start-draft')" ${full && enoughCaps ? "" : "disabled"} class="btn btn--success">${label}</button>`;
        controls += `<button onclick="if(confirm('Удалить лобби?'))act('DELETE','/lobby/${LID}')" class="btn btn--danger">Удалить лобби</button>`;
      }
      const capNote = `<p class="muted text-sm mt-2">👑 Капитанов: <b style="color:${enoughCaps ? 'var(--green)' : 'var(--accent)'}">${captains}</b> / ${lobby.team_count} нужно${enoughCaps ? "" : " — назначьте тир Captain нужным игрокам"}</p>`;
      const specNote = creatorIsSpectator() ? `<p class="muted text-sm">👁 Создатель — зритель (не играет).</p>` : "";

      return `<div class="card card--pad mt-4">
        <h2 class="font-bold mb-2">Игроки (${lobby.players_count}/${lobby.max_players})</h2>
        ${rows || '<p class="muted text-sm">Пока никого</p>'}
        ${capNote}
        ${specNote}
        <div class="flex flex-wrap gap-2 mt-5">${controls}</div>
      </div>`;
    }
    async function joinLobby() {
      let pw;
      if (lobby.has_password) { pw = prompt("Пароль лобби:"); if (pw === null) return; }
      await act("POST", "/lobby/" + LID + "/join", { password: pw || "" });
    }
    async function renameLobby() {
      const name = prompt("Новое название лобби:", lobby.name);
      if (name === null) return;
      await act("POST", `/lobby/${LID}/rename`, { name });
    }
    async function setTier(uid, cat) {
      await act("POST", `/lobby/${LID}/set-tier/${uid}`, { category: cat });
    }

    // ---------- ЭТАП 2: ДРАФТ ----------
    function renderDraft() {
      const s = draftState;
      const meIsCurrent = s.picking && s.current_captain === me.id;
      const cols = s.teams.map(team => {
        const slots = team.slots.map(sl =>
          `<a href="/player.html?id=${sl.user_id}" class="flex items-center justify-between text-sm py-1.5 hover:underline">
            <span>${esc(sl.nickname || sl.user_id.slice(-6))}</span><span class="cat">${esc(sl.category)}</span></a>`).join("");
        const empty = !team.captain_id;
        const canCaptain = empty && !s.picking && me.category === "Captain";
        const cap = empty
          ? (canCaptain
              ? `<button onclick="act('POST','/lobby/${LID}/claim-captain/${team.id}')" class="btn btn--primary btn--sm btn--block mb-2">Стать капитаном</button>`
              : `<div class="muted text-xs mb-2">Нет капитана</div>`)
          : "";
        const highlight = (s.picking && s.current_team === team.id) ? "style=\"border-color:var(--green);box-shadow:0 0 0 2px rgba(52,211,153,.3)\"" : "";
        return `<div class="card card--pad" ${highlight}>
          <div class="font-bold mb-2 flex items-center justify-between">${esc(team.name)} <span class="muted text-xs">${team.slots.length}/${s.slots_per_team}</span></div>
          ${cap}${slots}
        </div>`;
      }).join("");

      const avail = s.available.map(p => {
        const pickBtn = meIsCurrent
          ? `<button onclick="act('POST','/lobby/${LID}/pick/${p.user_id}')" class="btn btn--primary btn--sm">Добавить</button>`
          : "";
        return `<div class="row text-sm">
          <span class="flex items-center gap-2">${esc(p.nickname || p.user_id.slice(-6))} <span class="cat">${esc(p.category)}</span></span>${pickBtn}
        </div>`;
      }).join("");

      // Краткая инструкция (сворачиваемая).
      const help = `<details class="card mb-4" style="padding:14px 18px">
        <summary style="cursor:pointer;font-weight:700">❓ Как идёт драфт</summary>
        <ol class="muted text-sm mt-3" style="line-height:1.8;padding-left:18px">
          <li>Капитаны (тир <b>Captain</b>) занимают команды кнопкой <b>«Стать капитаном»</b>.</li>
          <li>Когда у всех команд есть капитан — жеребьёвка задаёт <b>порядок пиков</b>.</li>
          <li>Капитаны <b>по очереди</b> выбирают игроков кнопкой <b>«Добавить»</b> из списка ниже.</li>
          <li>Кнопка «Добавить» активна <b>только у того, чья сейчас очередь</b>.</li>
          <li>Когда все команды набрали по ${s.slots_per_team} игроков — драфт завершён, создатель жмёт «Сформировать сетку».</li>
        </ol></details>`;

      let banner = "";
      if (!s.picking) banner = `<div class="alert alert--warn mb-4">Капитаны (тир Captain) занимают команды кнопкой «Стать капитаном». Осталось команд без капитана: ${s.teams.filter(t => !t.captain_id).length}</div>`;
      else if (s.complete) {
        banner = `<div class="alert alert--success mb-4">Драфт завершён! ${isManager() ? "" : "Ожидайте формирования сетки."}</div>`;
        if (isManager()) banner += `<button onclick="act('POST','/lobby/${LID}/generate-bracket')" class="btn btn--success mb-4">Сформировать сетку</button>`;
      } else if (meIsCurrent) {
        banner = `<div class="mb-4" style="background:linear-gradient(135deg,var(--accent),var(--accent-600));color:#1a1206;border-radius:14px;padding:16px 18px;font-weight:800;font-size:1.1rem">🎯 ВАШ ХОД! Выберите игрока кнопкой «Добавить» в списке ниже.</div>`;
      } else {
        const curName = s.current_captain ? nick(s.current_captain) : "—";
        banner = `<div class="alert alert--info mb-4" style="font-size:1.02rem">⏳ Сейчас пикает: <b>${esc(curName)}</b> (команда ${s.current_team}). Ждите свою очередь.</div>`;
      }
      // Строка порядка пиков с подсветкой текущего.
      let orderStrip = "";
      if (s.picking && !s.complete && s.order && s.order.length) {
        orderStrip = `<div class="muted text-sm mb-4">Очередь: ` + s.order.map(tid => {
          const t = s.teams.find(x => x.id === tid);
          const label = t ? esc(t.name) : ("Команда " + tid);
          return tid === s.current_team ? `<b style="color:var(--accent)">▶ ${label}</b>` : label;
        }).join(" → ") + `</div>`;
      }
      if (isManager() && s.can_undo) {
        banner += `<button onclick="act('POST','/lobby/${LID}/undo-pick')" class="btn btn--warn btn--sm mb-4">↩ Отменить последний пик</button>`;
      }

      return `<div class="mt-4">
        ${help}${banner}${orderStrip}
        <div class="grid grid-cols-2 md:grid-cols-${Math.min(s.teams.length, 4)} gap-3 mb-6">${cols}</div>
        ${s.picking && !s.complete ? `<div class="card card--pad">
          <h3 class="font-bold mb-2">Доступные игроки (${s.available.length})</h3>${avail || '<p class="muted text-sm">Все разобраны</p>'}</div>` : ""}
      </div>`;
    }

    // ---------- ЭТАП 3: СЕТКА ----------
    function teamName(id) {
      const t = (lobby.teams || []).find(t => t.id === id);
      return t ? t.name : (id ? "Команда " + id : "—");
    }
    function roundTitle(r, last) {
      const d = last - r;
      if (d === 1) return "Полуфинал";
      if (d === 2) return "Четвертьфинал";
      return "Раунд " + (r + 1);
    }
    // Колонка раунда (side = "left" | "right").
    function roundCol(r, last, matches, side) {
      if (!matches.length) return "";
      return `<div class="br-round br-round--${side}">
        <div class="br-round__title">${roundTitle(r, last)}</div>
        <div class="br-matches">${matches.map(m => matchCard(m)).join("")}</div>
      </div>`;
    }
    // Зеркальная сетка: левая половина → центр (финалисты + кубок) ← правая половина.
    function renderActive() {
      const b = lobby.bracket || { rounds: [] };
      if (!b.rounds.length) return `<div class="muted mt-4">Сетка ещё не сформирована</div>`;
      const last = b.rounds.length - 1;
      const champ = bracketChampion(b);

      // Левая половина: рауноды 0..last-1, первая половина матчей (слева направо).
      let left = "";
      for (let r = 0; r < last; r++) {
        const half = b.rounds[r].matches.length / 2;
        left += roundCol(r, last, b.rounds[r].matches.slice(0, half), "left");
      }
      // Правая половина: от центра наружу — полуфинал, затем ранние раунды.
      let right = "";
      for (let r = last - 1; r >= 0; r--) {
        const half = b.rounds[r].matches.length / 2;
        right += roundCol(r, last, b.rounds[r].matches.slice(half), "right");
      }

      // Центр: финалист | кубок | финалист.
      const fm = b.rounds[last].matches[0];
      const finalist = (id, score) => {
        if (id == null) return `<div class="bm-finalist bm-finalist--tbd"><div class="bm-fin-name">— финалист —</div></div>`;
        const win = champ === id;
        return `<div class="bm-finalist ${win ? "bm-finalist--win" : ""}">
          <div class="bm-fin-name">${esc(teamName(id))}${win ? " 🏆" : ""}</div>
          <div class="bm-fin-score">${score}</div></div>`;
      };
      const finalReady = fm.team1 != null && fm.team2 != null;
      let finalBo3 = "";
      if (isManager() && finalReady && !fm.winner) {
        const btn = (a, bb) => `<button onclick="submitScore(${fm.id},${a},${bb})" class="btn btn--ghost btn--sm">${a}:${bb}</button>`;
        finalBo3 = `<div class="br-bo3" style="border:0;padding:8px 0 0">${btn(2,0)}${btn(2,1)}${btn(1,2)}${btn(0,2)}</div>`;
      }
      const center = `<div class="bm-center">
        ${finalist(fm.team1, fm.score1)}
        <div class="bm-trophy-wrap">
          <div class="br-trophy">🏆</div>
          <div class="br-champ-name">${champ ? esc(teamName(champ)) : "Финал"}</div>
          <div class="br-champ-sub">${champ ? "Чемпион" : "BO3"}</div>
          ${finalBo3}
        </div>
        ${finalist(fm.team2, fm.score2)}
      </div>`;

      let finishBtn = "";
      if (isManager() && champ && lobby.status === "active") {
        finishBtn = `<div class="text-center"><button onclick="act('POST','/lobby/${LID}/finish')" class="btn btn--primary mt-4">🏆 Объявить победителя</button></div>`;
      }

      return `<div class="mt-4">
        <div class="bracket-mirror">
          <div class="bm-side bm-left">${left}</div>
          ${center}
          <div class="bm-side bm-right">${right}</div>
        </div>
        ${finishBtn}
      </div>`;
    }
    function bracketChampion(b) {
      if (!b.rounds.length) return null;
      const fin = b.rounds[b.rounds.length - 1].matches;
      return (fin.length === 1 && fin[0].winner) ? fin[0].winner : null;
    }
    function matchCard(m, isFinal) {
      const ready = m.team1 != null && m.team2 != null;
      const w = m.winner;
      const row = (id, score) => {
        if (id == null) return `<div class="br-match__row br-match__row--tbd"><span>— ожидание —</span><span></span></div>`;
        const win = w === id;
        return `<div class="br-match__row ${win ? "br-match__row--win" : ""}">
          <span>${esc(teamName(id))}${win ? " 🏆" : ""}</span><span class="br-match__score">${score}</span></div>`;
      };
      // BO3: счёт по картам, варианты 2:0 / 2:1 / 1:2 / 0:2
      let bo3 = "";
      if (isManager() && ready && !w) {
        const btn = (a, bb) => `<button onclick="submitScore(${m.id},${a},${bb})" class="btn btn--ghost btn--sm">${a}:${bb}</button>`;
        bo3 = `<div class="br-bo3">${btn(2,0)}${btn(2,1)}${btn(1,2)}${btn(0,2)}</div>`;
      }
      return `<div class="br-match">${row(m.team1, m.score1)}${row(m.team2, m.score2)}${bo3}</div>`;
    }
    async function submitScore(mid, s1, s2) {
      await act("POST", `/lobby/${LID}/match/${mid}/result`, { score1: s1, score2: s2 });
    }

    // ---------- ЭТАП 4: ЗАВЕРШЕНИЕ ----------
    function renderFinished() {
      const champ = lobby.winner_team_id;
      return `<div class="mt-4">
        <div class="card card--pad text-center mb-6" style="background:linear-gradient(135deg,var(--accent),var(--accent-600));color:#1a1206;border:0">
          <div class="text-6xl mb-2">🏆</div>
          <div class="text-2xl font-extrabold">${esc(teamName(champ))}</div>
          <div style="opacity:.8">Чемпион турнира</div>
        </div>
        ${renderActive()}
      </div>`;
    }

    // ---------- WebSocket ----------
    function connectWS() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const sock = new WebSocket(`${proto}://${location.host}/ws/lobby/${LID}`);
      sock.onmessage = (ev) => {
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.type === "deleted") { alert("Лобби удалено"); location.href = "/"; return; }
        reload();
      };
      sock.onclose = () => setTimeout(connectWS, 2000);
    }

    async function init() {
      me = await requireAuth();
      document.getElementById("nav").innerHTML = navBar(me);
      // Если есть активная админ-сессия — даём god-mode управление этим лобби.
      try { await api("GET", "/admin/me"); isAdmin = true; } catch {}
      try { await reload(); } catch (err) { flashErr(err.message); return; }
      connectWS();
    }
    init();
  </script>
</body>
</html>
